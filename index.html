<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 2.0.0</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

iframe{
    width:100vw;
    height:100vh;
    border:none;
}
</style>

</head>
<body>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

// číslo dne (stejné video pro všechny v jeden den)
const dayNumber = Math.floor(Date.now() / 86400000);

// seed random (stabilní výběr)
function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

// výběr videa
const index = Math.floor(
    seededRandom(dayNumber) * videos.length
);

const videoId = videos[index];

// YouTube embed
document.getElementById("player").src =
`https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}`;

</script>

</body>
</html>
