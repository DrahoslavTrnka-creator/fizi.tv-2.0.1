<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 2.0.0</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
}

iframe{
    width:100vw;
    height:100vh;
    border:none;
}

#jumpscareBtn{
    position:fixed;
    top:10px;
    right:10px;
    z-index:10;
    padding:10px 15px;
    font-size:16px;
    background:red;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>

</head>
<body>

<button id="jumpscareBtn">💀 JUMPSCARE</button>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<script>

// 🎥 normální FIZI videa
const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

// 📅 video dne
const dayNumber = Math.floor(Date.now() / 86400000);

function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

const index = Math.floor(seededRandom(dayNumber) * videos.length);

const videoId = videos[index];

const player = document.getElementById("player");

// normální video
player.src =
`https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}`;

// 💀 JUMPSCARE RICKROLL
document.getElementById("jumpscareBtn").onclick = function(){

    player.src =
    "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&loop=1&playlist=dQw4w9WgXcQ";

    // pokus o fullscreen
    if (player.requestFullscreen) {
        player.requestFullscreen();
    }

};

</script>

</body>
</html>
