<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 4.0</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

/* VIDEO */
iframe{
    width:100vw;
    height:100vh;
    border:none;
    display:none;
}

/* START BUTTON */
#startBtn{
    width:220px;
    height:220px;
    border-radius:50%;
    background:red;
    color:white;
    font-size:28px;
    font-weight:bold;
    border:none;
    cursor:pointer;
    box-shadow:0 0 40px red;
}

/* VOLUME BUTTON */
#volBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:orange;
    color:black;
    font-weight:bold;
    border:none;
    cursor:pointer;
    display:none;
}

/* ESC SCREEN */
#escScreen{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    color:white;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    z-index:999;
}
</style>

</head>
<body>

<button id="startBtn">NESAHEJ</button>
<button id="volBtn">🔊 MAX</button>

<div id="escScreen">ESC MODE</div>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<!-- 🔊 METAL PIPE SOUND (kliknutelný) -->
<audio id="pipeSound" src="https://www.myinstants.com/media/sounds/metal-pipe-falling-sound-effect.mp3"></audio>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

const dayNumber = Math.floor(Date.now() / 86400000);

function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

const index = Math.floor(seededRandom(dayNumber) * videos.length);
const normalVideo = videos[index];

const player = document.getElementById("player");
const escScreen = document.getElementById("escScreen");
const volBtn = document.getElementById("volBtn");
const pipeSound = document.getElementById("pipeSound");

let maxMode = false;

// START BUTTON
document.getElementById("startBtn").onclick = function(){

    this.style.display = "none";
    player.style.display = "block";
    volBtn.style.display = "block";

    // 💀 Rickroll jumpscare
    player.src =
    "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&loop=1&playlist=dQw4w9WgXcQ&mute=0";

    if (player.requestFullscreen) player.requestFullscreen();

    // 🔊 metal pipe sound
    pipeSound.volume = 1;
    pipeSound.currentTime = 0;
    pipeSound.play();

    // po 3s normální video
    setTimeout(()=>{
        player.src =
        `https://www.youtube.com/embed/${normalVideo}?autoplay=1&mute=1&loop=1&playlist=${normalVideo}`;
    }, 3000);
};

// VOLUME BUTTON
volBtn.onclick = function(){

    maxMode = !maxMode;

    player.volume = 1;

    escScreen.style.display = "flex";

    setTimeout(()=>{
        escScreen.style.display = "none";
    }, 800);

    volBtn.innerText = maxMode ? "🔊 100%" : "🔊 MAX";
};

</script>

</body>
</html>
