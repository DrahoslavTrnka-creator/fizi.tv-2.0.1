<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 3.0</title>

<style>
body{
    margin:0;
    background:black;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* video */
iframe{
    width:100vw;
    height:100vh;
    border:none;
    display:none;
}

/* start tlačítko */
#startBtn{
    width:220px;
    height:220px;
    border-radius:50%;
    background:red;
    color:white;
    font-size:28px;
    border:none;
    cursor:pointer;
    box-shadow:0 0 40px red;
}

/* volume button */
#volBtn{
    position:fixed;
    bottom:20px;
    right:20px;
    width:120px;
    height:120px;
    border-radius:50%;
    background:orange;
    color:black;
    font-weight:bold;
    border:none;
    cursor:pointer;
    display:none;
}

/* ESC fake screen */
#escScreen{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    color:white;
    font-size:40px;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:999;
}
</style>

</head>
<body>

<button id="startBtn">NESAHEJ</button>
<button id="volBtn">🔊 MAX</button>

<div id="escScreen">ESC MODE</div>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<!-- METAL PIPE SOUND -->
<iframe width="110" height="200"
src="https://www.myinstants.com/instant/metal-pipe-falling-sound-effect-7737/embed/"
frameborder="0"></iframe>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

const dayNumber = Math.floor(Date.now() / 86400000);

function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

const index = Math.floor(seededRandom(dayNumber) * videos.length);

const normalVideo = videos[index];

const player = document.getElementById("player");
const escScreen = document.getElementById("escScreen");
const volBtn = document.getElementById("volBtn");

let isMax = false;

// START
document.getElementById("startBtn").onclick = function(){

    this.style.display = "none";
    player.style.display = "block";
    volBtn.style.display = "block";

    // rickroll start
    player.src =
    "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&loop=1&playlist=dQw4w9WgXcQ&mute=0";

    // fullscreen attempt
    if (player.requestFullscreen) player.requestFullscreen();
};

// VOLUME BUTTON
volBtn.onclick = function(){

    isMax = !isMax;

    if(isMax){
        player.src =
        player.src + "&autoplay=1&mute=0";
        volBtn.innerText = "🔊 100%";
    } else {
        player.src =
        player.src.replace("&mute=0","") + "&mute=0";
        volBtn.innerText = "🔊 MAX";
    }

    // ESC fake screen effect
    escScreen.style.display = "flex";
    setTimeout(()=>{
        escScreen.style.display = "none";
    }, 800);
};

</script>

</body>
</html>
