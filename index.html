<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 7.0</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* MENU */
#menu{
    text-align:center;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.rand{ background:orange; }
.week{ background:blue; color:white; }
.dont{ background:red; color:white; }

/* VIDEO */
iframe{
    width:100vw;
    height:100vh;
    border:none;
    display:none;
}

/* overlay troll */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    color:red;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    z-index:999;
}
</style>

</head>
<body>

<div id="menu">
    <h2>📺 FIZI.TV START</h2>
    <button class="rand" onclick="startRandom()">🎲 RANDOM VIDEO</button>
    <button class="week" onclick="startWeekly()">📅 TÝDENNÍ VIDEO</button>
    <button class="dont" onclick="doNotTouch()">💀 DO NOT TOUCH</button>
</div>

<div id="overlay">💀 CHYBA SYSTÉMU...</div>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

const menu = document.getElementById("menu");
const player = document.getElementById("player");
const overlay = document.getElementById("overlay");

// 🎲 RANDOM
function startRandom(){

    menu.style.display = "none";
    player.style.display = "block";

    const id = videos[Math.floor(Math.random()*videos.length)];

    playVideo(id);
}

// 📅 TÝDENNÍ (stabilní výběr)
function startWeekly(){

    menu.style.display = "none";
    player.style.display = "block";

    const week = Math.floor(Date.now() / 604800000); // týden
    const index = seededRandom(week) * videos.length | 0;

    playVideo(videos[index]);
}

// 💀 DO NOT TOUCH
function doNotTouch(){

    menu.style.display = "none";
    overlay.style.display = "flex";

    setTimeout(()=>{

        overlay.style.display = "none";
        player.style.display = "block";

        const id = videos[Math.floor(Math.random()*videos.length)];

        playVideo(id);

    }, 2000);
}

// ▶️ play function
function playVideo(id){

    player.src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&loop=1&playlist=${id}`;

    if (player.requestFullscreen) {
        player.requestFullscreen();
    }
}

// seed funkce
function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

</script>

</body>
</html>
