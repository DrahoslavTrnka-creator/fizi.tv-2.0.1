<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 5.1</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* MENU */
#menu{
    text-align:center;
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

#startBtn{ background:red; color:white; }
.opt{ background:orange; }

/* VIDEO */
iframe{
    width:100vw;
    height:100vh;
    border:none;
    display:none;
}
</style>

</head>
<body>

<div id="menu">
    <button id="startBtn">💀 START (NESAHEJ)</button>
    <button class="opt" onclick="playToday()">📺 Video dne</button>
    <button class="opt" onclick="playRandom()">🎲 Random video</button>
</div>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<audio id="pipeSound" src="https://www.myinstants.com/media/sounds/metal-pipe-falling-sound-effect.mp3"></audio>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

const menu = document.getElementById("menu");
const player = document.getElementById("player");
const pipeSound = document.getElementById("pipeSound");

// FIX: čekání na DOM (řeší null error)
window.onload = function(){

    const startBtn = document.getElementById("startBtn");

    startBtn.onclick = function(){

        menu.style.display = "none";
        player.style.display = "block";

        // 💀 Rickroll jumpscare
        player.src =
        "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&loop=1&playlist=dQw4w9WgXcQ";

        // fullscreen
        if (player.requestFullscreen) {
            player.requestFullscreen();
        }

        // 🔊 sound
        pipeSound.volume = 1;
        pipeSound.currentTime = 0;
        pipeSound.play();

        // po 3s video dne
        setTimeout(playToday, 3000);
    };
};

// 📅 video dne
function playToday(){

    const dayNumber = Math.floor(Date.now() / 86400000);

    const index = Math.floor(
        seededRandom(dayNumber) * videos.length
    );

    loadVideo(videos[index]);
}

// 🎲 random video
function playRandom(){
    const id = videos[Math.floor(Math.random()*videos.length)];
    loadVideo(id);
}

// load video
function loadVideo(id){

    menu.style.display = "none";
    player.style.display = "block";

    player.src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=1&loop=1&playlist=${id}`;
}

// seed funkce
function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

</script>

</body>
</html>
