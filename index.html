<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 8.1</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* MENU */
#menu{
    text-align:center;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
}

button{
    padding:15px 25px;
    margin:10px;
    font-size:18px;
    border:none;
    border-radius:12px;
    cursor:pointer;
}

.rand{ background:orange; }
.week{ background:blue; color:white; }
.dont{ background:red; color:white; }

/* VIDEO */
iframe{
    width:100vw;
    height:100vh;
    border:none;
    display:none;
}

/* 🔴 HOME BUTTON VŽDY VIDITELNÝ */
#homeBtn{
    position:fixed;
    top:15px;
    right:15px;
    z-index:99999;

    padding:12px 18px;
    border:none;
    border-radius:12px;

    background:red;
    color:white;
    font-weight:bold;
    font-size:16px;

    cursor:pointer;

    display:block;
    box-shadow:0 0 15px red;
}

/* OVERLAY */
#overlay{
    position:fixed;
    top:0;
    left:0;
    width:100vw;
    height:100vh;
    background:black;
    color:red;
    display:none;
    justify-content:center;
    align-items:center;
    font-size:40px;
    z-index:999;
}
</style>

</head>
<body>

<button id="homeBtn" onclick="goHome()">🏠 HOME</button>

<div id="menu">
    <h2>📺 FIZI.TV MENU</h2>
    <button class="rand" onclick="startRandom()">🎲 RANDOM VIDEO</button>
    <button class="week" onclick="startWeekly()">📅 TÝDENNÍ VIDEO</button>
    <button class="dont" onclick="doNotTouch()">💀 DO NOT TOUCH</button>
</div>

<div id="overlay">💀 CHYBA SYSTÉMU...</div>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

const menu = document.getElementById("menu");
const player = document.getElementById("player");
const overlay = document.getElementById("overlay");

// 🏠 HOME
function goHome(){
    player.style.display = "none";
    player.src = "";
    menu.style.display = "block";
    overlay.style.display = "none";
}

// ▶️ PLAY VIDEO
function playVideo(id){

    menu.style.display = "none";
    overlay.style.display = "none";
    player.style.display = "block";

    player.src =
    `https://www.youtube.com/embed/${id}?autoplay=1&mute=0&loop=1&playlist=${id}`;

    if (player.requestFullscreen) {
        player.requestFullscreen();
    }
}

// 🎲 RANDOM
function startRandom(){
    const id = videos[Math.floor(Math.random()*videos.length)];
    playVideo(id);
}

// 📅 TÝDENNÍ
function startWeekly(){

    const week = Math.floor(Date.now() / 604800000);
    const index = seededRandom(week) * videos.length | 0;

    playVideo(videos[index]);
}

// 💀 DO NOT TOUCH
function doNotTouch(){

    menu.style.display = "none";
    overlay.style.display = "flex";

    setTimeout(()=>{

        const id = videos[Math.floor(Math.random()*videos.length)];
        playVideo(id);

    }, 2000);
}

// seed
function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

</script>

</body>
</html>
