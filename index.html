<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>FIZI.TV 5.0</title>

<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial;
    overflow:hidden;
}

/* VIDEO */
iframe{
    width:100vw;
    height:100vh;
    border:none;
    display:none;
}

/* MENU */
#menu{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
}

button{
    display:block;
    margin:10px auto;
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}

#startBtn{ background:red; color:white; }
.opt{ background:orange; }
</style>

</head>
<body>

<div id="menu">
    <button id="startBtn">💀 NESAHEJ (START)</button>
    <button class="opt" onclick="playToday()">📺 Video dne</button>
    <button class="opt" onclick="playRandom()">🎲 Náhodné video</button>
</div>

<iframe id="player" allow="autoplay; fullscreen"></iframe>

<audio id="pipeSound" src="https://www.myinstants.com/media/sounds/metal-pipe-falling-sound-effect.mp3"></audio>

<script>

const videos = [
    "30AYSN2ZiV0",
    "GAvk-Z1O7Gs",
    "G9HDbaEd_Eo",
    "kiS6vOmX6lI",
    "deqc2NaxoZ4",
    "xPpEkRCuun8",
    "-RcR8TPn-6I",
    "EdwnJmHpqRw",
    "KOwwU_HzJio",
    "LifQbgwfF5M"
];

const player = document.getElementById("player");
const menu = document.getElementById("menu");
const pipeSound = document.getElementById("pipeSound");

// seed pro "video dne"
function seededRandom(seed){
    const x = Math.sin(seed) * 10000;
    return x - Math.floor(x);
}

// START (rickroll + sound)
document.getElementById("startBtn").onclick = function(){

    menu.style.display = "none";
    player.style.display = "block";

    player.src =
    "https://www.youtube.com/embed/dQw4w9WgXcQ?autoplay=1&loop=1&playlist=dQw4w9WgXcQ";

    if (player.requestFullscreen) player.requestFullscreen();

    pipeSound.volume = 1;
    pipeSound.currentTime = 0;
    pipeSound.play();
};

// 📺 video dne
function playToday(){

    const dayNumber = Math.floor(Date.now() / 86400000);
    const index = Math.floor(seededRandom(dayNumber) * videos.length);

    const videoId = videos[index];

    menu.style.display = "none";
    player.style.display = "block";

    player.src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}`;
}

// 🎲 random video
function playRandom(){

    const videoId = videos[Math.floor(Math.random()*videos.length)];

    menu.style.display = "none";
    player.style.display = "block";

    player.src =
    `https://www.youtube.com/embed/${videoId}?autoplay=1&mute=1&loop=1&playlist=${videoId}`;
}

</script>

</body>
</html>
